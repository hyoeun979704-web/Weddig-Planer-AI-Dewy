name: E2E

# 페르소나 타겟팅 등 핵심 UX 분기를 실제 브라우저로 검증(Playwright).
#
# ⚠️ 출시 시 제거 대상: 이 워크플로 + playwright.config.ts + e2e/ + @playwright/test
#   devDep 만 지우면 깔끔히 떨어진다. 메인 가드(ci.yml: lockfile/lint)와 독립이라
#   삭제해도 빌드/배포 파이프라인 영향 0.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: npm ci
        run: npm ci

      # CI 러너엔 브라우저가 없으므로 chromium 만 설치(+OS 의존성).
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # test:e2e = `vite build && playwright test`. webServer 가 preview 를 기동.
      - name: Run e2e
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
