name: Weekly Full Audit

# 매주 1회, 개발 에이전트(Claude)가 저장소 전체를 감사한다.
#   - AGENTS.md "전체 코드리뷰" 14차원(보안·P0버그·dead-end UI/placeholder CTA·정확성·아키텍처·
#     iOS사파리·출시 적합성·안정성·법적규제·비용·접근성·개인정보·초개인화) + verification-lessons 교훈 기준.
#   - 결과를 docs/YYMMDD_codereview.md 로 남기고 draft PR 을 연다.
#
# ⚙️ 사전 준비(1회): 저장소 Settings → Secrets and variables → Actions 에
#    ANTHROPIC_API_KEY (또는 Claude Code OAuth 토큰)를 등록해야 동작한다.
#    키가 없으면 잡은 조용히 skip 되어 빨간 알림을 만들지 않는다.

on:
  schedule:
    # 매주 월요일 18:00 UTC (= 화 03:00 KST)
    - cron: "0 18 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: weekly-audit
  cancel-in-progress: false

jobs:
  audit:
    name: full audit (claude)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Checkout
        if: env.HAS_KEY == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        if: env.HAS_KEY == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        if: env.HAS_KEY == 'true'
        run: npm ci

      - name: Run Claude full audit
        if: env.HAS_KEY == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # 감사 지시 — AGENTS.md 의 전체 코드리뷰 양식을 그대로 따르게 한다.
          prompt: |
            이 저장소의 AGENTS.md "코드 작성·리뷰 규칙" 과 "전체 코드리뷰 기록" 절차대로
            전체 감사를 수행해줘. 14차원(정확성·보안·성능·테스트·유지보수성·아키텍처·iOS사파리·
            **출시 적합성**·**안정성**·**법적/전자상거래**·**비용/쿼터**·**접근성**·**개인정보**·
            **초개인화**)으로 점검하고, 특히 기능 감사가 그냥 통과시키는 네 가지를
            반드시 별도로 본다: ① **dead-end UI/placeholder CTA**(toast/안내만 띄우는 CTA, no-op
            onClick, "준비 중" 영구 잔존) ② **출시 적합성(스토어 컴플라이언스)** — 네이티브 권한
            사용설명 문자열·광고 ATT/SKAdNetwork·결제 IAP/anti-steering·회원탈퇴·UGC 신고차단
            (웹 CI 가 iOS 빌드를 안 밟아 ATT·권한문구 결함이 안 보임) ③ **안정성** — 흰화면/무한로딩·
            플러그인 init 실패 폴백·실패경로 관측 ④ **초개인화(공세 차원)** — surface 마다 가용 신호
            (페르소나·D-day·예산·취향 등) 활용도·개인화 깊이를 보고 **개인화 기회 매트릭스**(현재깊이→
            목표깊이)로 덜 개인화된 곳을 뽑는다. **스코프는 그 주 diff 가 아니라 레포 전체 ×
            전 surface**다 — 점검 대상 단일 소스는 `docs/audit-surface-map.md`(소비자 A1~A7·기업 B·
            운영자 C1~C5·네이티브 D·백엔드 E, 라우트 130+ 전수, **관리 항목 하위까지**). 변경분만 보면
            ATT 같은 기존 구멍을 못 본다. **surface 별로 병렬 서브에이전트 fan-out** 하고 각자 14차원으로
            훑은 뒤, 감사 문서에 그 맵 기준 **커버리지 표**(✅본/⚠️일부/⬜미점검) + **개인화 기회 매트릭스**를
            넣어라. 직접 build/lint 검증.
            결과를 docs/<오늘YYMMDD>_codereview.md 로 작성(AGENTS 양식: TL;DR→영역별→
            마이그레이션표→deferred, 각 항목 커밋해시·파일명)하고, 저위험·표적 수정만
            적용한 뒤 새 브랜치에 커밋해 **draft PR** 을 열어줘. 광범위 리팩터는 금지.
          claude_args: "--max-turns 80"

      - name: Note when skipped
        if: env.HAS_KEY != 'true'
        run: |
          echo "::notice title=Weekly audit skipped::ANTHROPIC_API_KEY 시크릿이 없어 감사를 건너뛰었어요. Settings → Secrets 에 등록하면 매주 자동 실행됩니다."
