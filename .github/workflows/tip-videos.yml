name: Collect Tip Videos

# YouTube wedding tip video collector. Manual trigger + weekly cron.
# Quota footprint per full run: ~3,600 units (well within 10k/day free tier).

on:
  schedule:
    # 04:00 KST every Monday (Sunday 19:00 UTC)
    - cron: "0 19 * * 0"
  workflow_dispatch:
    inputs:
      category:
        description: "Single category slug (general / wedding_hall / hanbok / ...) — empty = all"
        required: false
        default: ""
      per_query:
        description: "Max results per query (default 8)"
        required: false
        default: "8"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=()
          for v in YOUTUBE_API_KEY SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Add them in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Collect tip videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INPUT_CATEGORY: ${{ github.event.inputs.category }}
          INPUT_PER_QUERY: ${{ github.event.inputs.per_query }}
        run: |
          ARGS="--per-query=${INPUT_PER_QUERY:-8}"
          if [ -n "$INPUT_CATEGORY" ]; then
            ARGS="$ARGS --category=$INPUT_CATEGORY"
          fi
          echo "Running: npm run collect-tips -- $ARGS"
          npm run collect-tips -- $ARGS
