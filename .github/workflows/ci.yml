name: CI

# PR 머지 전에 "수집 파이프라인이 조용히 멈추는" 회귀를 잡는 가드.
#
# 핵심: package.json 과 package-lock.json 이 어긋난 채로 머지되면
#   nightly-collection / tip-videos 의 `npm ci` 가 즉시 실패한다(EUSAGE).
#   그러면 데이터가 며칠간 조용히 안 들어오고, 빨간 신호도 없다(스케줄은
#   net.http_post/cron 이 "성공"으로 기록되거나 Actions 가 야간에만 도므로).
#   이 워크플로가 PR 단계에서 그걸 빨갛게 만들어 머지를 막는다.
#
# 이 검사가 머지를 "차단"하려면 GitHub → Settings → Branches → main 브랜치
# 보호 규칙에서 "Require status checks to pass" 에 이 CI 의 verify 잡을
# 필수로 지정해야 한다. (워크플로만으로는 빨강 표시까지, 차단은 보호 규칙 필요.)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 같은 ref 에 새 커밋이 오면 이전 실행 취소 (러너 절약)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (lockfile & lint)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 핵심 가드 — nightly-collection 이 실제로 돌리는 것과 동일한 `npm ci`.
      # lockfile 이 어긋나면 install 전에 EUSAGE 로 실패 → PR 이 빨갛게 됨.
      # 고치는 법: 로컬에서 `npm install` 후 package-lock.json 을 함께 커밋.
      - name: npm ci (package-lock.json in sync)
        run: npm ci

      # 보너스: src/scripts 의 lint 에러(경고 아님)를 머지 전에 잡음.
      - name: Lint
        run: npm run lint

      # FE↔BE 값 정합성 가드 — 한 번 고친 회귀(레거시 컬럼 total_points, 인라인 원
      # 포맷, places.category="suit" 등)가 다시 들어오면 머지 전에 빨갛게 만든다.
      - name: Integrity check (FE/BE value drift)
        run: npm run check:integrity

      # collect-places 는 tsx 로 실행돼 타입체크가 안 된다(예: CategorySlug 에
      # 카테고리를 추가했는데 CATEGORY_TABLE 에 안 넣으면 런타임에 조용히 누락).
      # 엔트리(index.ts)+import 만 스코프해서 머지 전에 타입에러를 잡는다.
      - name: Typecheck collect-places
        run: npx tsc -p scripts/collect-places/tsconfig.json

      # 사장님 앱(apps/partners, Phase 4-B) 빌드 가드 — 소비자 CI(e2e·Vercel)는 root 빌드만
      # 본다. 파트너 앱이 공유 패키지 alias 해석 실패·삭제된 shared export 등으로 조용히
      # 깨져도 소비자 신호는 초록이라 놓친다(앱 분리가 풀려는 "감사 누락" 문제 그 자체).
      # 이 스텝이 2번째 앱 빌드를 PR 단계에서 빨갛게 만든다(로컬 실측 ~10s).
      - name: Build partners app (Phase 4-B guard)
        run: npm run build:partners
