name: Enrich with Gemini

# Verify business data via Gemini 2.5 Flash + Google Search grounding.
# Hard-prompted, refuse-if-unsure, validates phone format & URL domains.
# Persists tel, hours, instagram_url, website_url, advantage_1/2/3,
# description into place_details / places.
#
# Cost: ~$0.035/grounded query × N rows = $50 for full backfill (~1500).
# Recommend running --pilot=50 first to spot-check, then full.

on:
  workflow_dispatch:
    inputs:
      category:
        description: "Korean category label (empty = all)"
        required: false
        default: ""
      pilot:
        description: "Pilot N rows then stop (overrides limit)"
        required: false
        default: ""
      limit:
        description: "Max rows when not in pilot mode"
        required: false
        default: "2000"

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 240   # 4 hours — full backfill at 4-15s/call
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=()
          for v in GEMINI_API_KEY SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Enrich
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INPUT_CATEGORY: ${{ github.event.inputs.category }}
          INPUT_PILOT: ${{ github.event.inputs.pilot }}
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          ARGS=""
          if [ -n "$INPUT_PILOT" ]; then
            ARGS="$ARGS --pilot=$INPUT_PILOT"
          else
            ARGS="$ARGS --limit=${INPUT_LIMIT:-2000}"
          fi
          if [ -n "$INPUT_CATEGORY" ]; then
            ARGS="$ARGS --category=$INPUT_CATEGORY"
          fi
          echo "Running: npm run enrich-with-gemini -- $ARGS"
          npm run enrich-with-gemini -- $ARGS
