name: Fix Naver place URLs

# Bulk-canonicalize place_details.naver_place_url. Replaces broken
# search-form URLs (https://map.naver.com/v5/search/...) with proper
# entry pages (https://m.place.naver.com/place/{id}). Scrapes Naver
# search HTML — no API key needed.
#
# Safe to re-run; only updates rows whose current URL is null or a
# search-form URL.

on:
  workflow_dispatch:
    inputs:
      category:
        description: "Category to fix (e.g. wedding_hall) — empty = all"
        required: false
        default: "wedding_hall"
      limit:
        description: "Max rows (empty = all candidates)"
        required: false
        default: ""
      dry_run:
        description: "Dry-run (log only, no DB write)"
        type: boolean
        required: false
        default: false
      force:
        description: "Force re-fetch even if URL already canonical"
        type: boolean
        required: false
        default: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=()
          for v in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing secrets: ${missing[*]}"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fix Naver URLs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INPUT_CATEGORY: ${{ github.event.inputs.category }}
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
        run: |
          ARGS=""
          if [ -n "$INPUT_CATEGORY" ]; then
            ARGS="$ARGS --category=$INPUT_CATEGORY"
          else
            ARGS="$ARGS --all"
          fi
          if [ -n "$INPUT_LIMIT" ]; then
            ARGS="$ARGS --limit=$INPUT_LIMIT"
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "$INPUT_FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          echo "Running: npm run fix-naver-urls -- $ARGS"
          npm run fix-naver-urls -- $ARGS
