name: Backfill Place Images

# One-shot backfill of places.main_image_url via Naver Image Search.
# Manual trigger only — no schedule, since after the live collector starts
# filling images on its own, this should rarely need to run.
#
# UI: Actions → Backfill Place Images → Run workflow
#   inputs.category: 한복 / 웨딩홀 / ... or empty (= all)
#   inputs.limit:    cap N rows (default 2000 — covers the full corpus)

on:
  workflow_dispatch:
    inputs:
      category:
        description: "Korean category label (empty = all)"
        required: false
        default: ""
      limit:
        description: "Max rows to backfill"
        required: false
        default: "2000"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=()
          for v in NAVER_CLIENT_ID NAVER_CLIENT_SECRET SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Backfill images
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INPUT_CATEGORY: ${{ github.event.inputs.category }}
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          ARGS="--limit=${INPUT_LIMIT:-2000}"
          if [ -n "$INPUT_CATEGORY" ]; then
            ARGS="$ARGS --category=$INPUT_CATEGORY"
          fi
          echo "Running: npm run backfill-images -- $ARGS"
          npm run backfill-images -- $ARGS
