name: Deploy Supabase Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  # 수동 재배포(배포 실패 복구·워크플로 수정 직후 등)용.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # step 의 if 에서는 secrets 컨텍스트를 쓸 수 없다(워크플로 파일 무효 →
    # 잡 0개 startup failure 로 배포 전체가 죽었던 사고, 260612). 시크릿을
    # job env 로 끌어올리면 env 컨텍스트로는 분기할 수 있다.
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - uses: supabase/setup-cli@v1
      - run: supabase link --project-ref qabeywyzjsgyqpjqsvkd
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # GEMINI 시크릿이 비어 있으면 이 스텝이 (빈 값 덮어쓰기 또는 에러로) 배포
      # 전체를 막던 사고가 있었다(260612). 값이 있을 때만 set 하고, 없으면 건너뛴다.
      # (AI 플래너 본경로는 OpenAI 로 전환돼 GEMINI 키 없이도 동작)
      - run: supabase secrets set GEMINI_API_KEY="$GEMINI_API_KEY"
        if: ${{ env.GEMINI_API_KEY != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # 인자 없는 deploy = supabase/functions/* 전체 배포.
      # (과거에 ask-gemini·ai-planner 두 개만 배포해, 나머지 함수 수정이
      #  main 에 머지돼도 프로덕션에 반영되지 않는 사고가 있었다 — 260612)
      - run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
