name: Deploy Supabase Migrations

# 마이그레이션 배포 파이프라인 (Task #7).
#
# 배경: 그동안 supabase/migrations/** 변경이 main 에 머지돼도 프로덕션에 **자동 적용되는
# 경로가 없었다**(edge function 만 deploy-functions.yml 로 배포됨). 그 결과 P0 보안
# 마이그가 머지됐는데 실DB 에 반영 안 된 사고가 있었다(docs/260625_migration_reconciliation.md).
#
# ⚠️ 안전장치 — 히스토리 드리프트 때문에 "자동 apply" 는 기본 비활성이다:
#   현재 repo 마이그(258개) ↔ 원격 schema_migrations(161개)의 버전 스탬프 lineage 가
#   갈라져 있어, `supabase db push` 가 이미 적용된 과거 마이그 220개를 재적용하려다
#   실패할 수 있다. **베이스라인 정합(docs/260625_migration_baseline_plan.md)을 끝내기
#   전에는 apply 를 켜지 말 것.**
#
# 그래서 이 워크플로의 기본 동작은 **dry-run(미적용 진단)** 이다:
#   - main 에 마이그가 머지되면 `db push --dry-run` 으로 "무엇이 적용될지"만 출력(읽기 전용,
#     프로덕션 무변경) → 드리프트를 가시화하고 누락 배포를 조기에 잡는다.
#   - 실제 적용은 사람이 workflow_dispatch 에서 apply=true 로 수동 실행(베이스라인 정합 후).
#
# 필요한 시크릿(레포 Settings → Secrets):
#   - SUPABASE_ACCESS_TOKEN : 이미 설정됨(deploy-functions.yml 과 공용).
#   - SUPABASE_DB_PASSWORD  : DB 비밀번호. **미설정 시 이 워크플로는 통째로 skip**(아래
#                             env 가드). 베이스라인 정합 후 추가하면 dry-run 부터 동작.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      apply:
        description: '실제 적용(db push). 비우면 dry-run 진단만.'
        type: boolean
        default: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    # 시크릿은 step if 에서 직접 못 쓴다(워크플로 무효화 → startup failure 사고, 260612).
    # job env 로 끌어올려 env 컨텍스트로 분기한다(deploy-functions.yml 과 동일 패턴).
    env:
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v3
      - uses: supabase/setup-cli@v1

      - name: Link project
        if: ${{ env.SUPABASE_DB_PASSWORD != '' }}
        run: supabase link --project-ref qabeywyzjsgyqpjqsvkd
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # 기본: dry-run(미적용). 프로덕션을 건드리지 않고 적용 예정 목록만 출력.
      - name: db push (dry-run)
        if: ${{ env.SUPABASE_DB_PASSWORD != '' && github.event.inputs.apply != 'true' }}
        run: supabase db push --dry-run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # 수동(apply=true)일 때만 실제 적용. 베이스라인 정합 완료 후 사용.
      - name: db push (apply)
        if: ${{ env.SUPABASE_DB_PASSWORD != '' && github.event.inputs.apply == 'true' }}
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Secret 미설정 안내
        if: ${{ env.SUPABASE_DB_PASSWORD == '' }}
        run: echo "SUPABASE_DB_PASSWORD 미설정 — 마이그 배포 파이프라인 skip. docs/260625_migration_baseline_plan.md 참고."
